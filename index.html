<!DOCTYPE html>
<html>
<head>
    <title>Truth or Dare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(-45deg, #0d0d0d, #1a1a2e, #16213e, #0f3460); background-size: 400% 400%; animation: gradientBG 20s ease infinite; color: #ffffff; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 90vh; overflow-x: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        h1 { color: #ff4757; font-size: 40px; margin-top: 30px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        h2, h3, p { color: #f1f2f6; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        input, select, textarea { padding: 15px; font-size: 16px; margin: 10px; border: none; border-radius: 15px; width: 80%; max-width: 300px; outline: none; background-color: rgba(255, 255, 255, 0.9); font-family: inherit; color: #121212; }
        input, select { text-align: center; border-radius: 25px; }
        textarea { text-align: left; min-height: 150px; resize: vertical; line-height: 1.5; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; margin: 10px; border: none; border-radius: 25px; cursor: pointer; background-color: #1e90ff; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        button[onclick="sendDaresToServer()"] { background-color: #2ed573; margin-top: 15px;} 
        button[onclick="requestDare()"] { background-color: #ffa502; font-size: 22px; padding: 15px 40px;} 
        button[onclick="endTurn()"] { background-color: #2ed573; margin-top: 20px;} 
        
        /* NEW: Styling for the Skip Button */
        button[onclick="skipDare()"] { background-color: #ff4757; margin-top: 10px; padding: 12px 25px; font-size: 16px;} 
        
        .card-container { position: relative; width: 280px; height: 380px; perspective: 1000px; margin: 20px auto; display: none; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; z-index: 5; }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-front { background: repeating-linear-gradient(45deg, #2f3542, #2f3542 15px, #1e272e 15px, #1e272e 30px); color: #ffffff; font-size: 80px; border: 8px solid #ffffff; }
        .card-back { background-color: #ffffff; color: #ff4757; transform: rotateY(180deg); font-size: 26px; font-weight: bold; border: 8px solid #ff4757; }
        
        .dummy-card { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; opacity: 0; background: repeating-linear-gradient(45deg, #2f3542, #2f3542 15px, #1e272e 15px, #1e272e 30px); border: 8px solid #ffffff; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .shuffling .dummy-card { opacity: 1; }
        .shuffling .dummy-1 { animation: shuffle1 0.4s ease-in-out infinite; }
        .shuffling .dummy-2 { animation: shuffle2 0.4s ease-in-out infinite 0.1s; }
        .shuffling .dummy-3 { animation: shuffle3 0.4s ease-in-out infinite 0.2s; }
        @keyframes shuffle1 { 50% { transform: translate(-60px, -20px) rotate(-15deg); z-index: 6; } }
        @keyframes shuffle2 { 50% { transform: translate(60px, 10px) rotate(15deg); z-index: 6; } }
        @keyframes shuffle3 { 50% { transform: translate(-40px, 30px) rotate(-5deg); z-index: 6; } }
        
        .reaction-btn { background: transparent; box-shadow: none; font-size: 32px; padding: 5px; margin: 0 5px; transition: transform 0.1s; cursor: pointer; border: none; }
        .reaction-btn:hover { transform: scale(1.2); }
        .reaction-btn:active { transform: scale(0.8); }
        .floating-emoji { position: fixed; bottom: 15%; font-size: 35px; pointer-events: none; animation: floatUp 2.5s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 0.8; } 100% { transform: translateY(-400px) scale(1.3); opacity: 0; } }

        #disconnectWarning { display: none; background-color: #ff4757; color: white; padding: 15px; width: 100%; position: fixed; top: 0; left: 0; font-weight: bold; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="disconnectWarning">⚠️ Friend disconnected! Waiting up to 5 minutes for them to return...</div>
    
    <h1>Truth or Dare!</h1>

    <div id="lobby">
        <input type="text" id="playerNameInput" placeholder="Enter your Name" required>
        <br>
        <p>Choose your rules:</p>
        <select id="gameMode">
            <option value="combined">Mode 1: Mixed Dares (Combined)</option>
            <option value="opponent">Mode 2: Opponent's Dares Only (1v1)</option>
        </select>
        <br>
        <button onclick="createGame()">Create Game</button>
        <br><br>
        <p>OR</p>
        <input type="text" id="roomCodeInput" placeholder="Enter Room Code">
        <button onclick="joinGame()">Join Game</button>
    </div>

    <div id="setupArea" style="display:none;">
        <h2>Room: <span id="displayRoomCode"></span></h2>
        <h3 id="statusMessage">Waiting for friend...</h3>
        <p style="font-size: 14px; color: #a4b0be;">Press <strong>Enter</strong> to start a new line for each dare.</p>
        <textarea id="dareInputArea" placeholder="Sing a song&#10;Do 10 pushups&#10;Call your crush"></textarea>
        <br>
        <button id="readyBtn" onclick="sendDaresToServer()">I'm Ready!</button>
    </div>

    <div id="gameArena" style="display:none;">
        <h2 id="turnDisplay">Loading game...</h2>
        
        <div id="activePlayerControls" style="display:none;">
            <button id="drawBtn" onclick="requestDare()">Draw a Dare!</button>
        </div>

        <div id="cardArea" class="card-container">
            <div class="dummy-card dummy-1"></div>
            <div class="dummy-card dummy-2"></div>
            <div class="dummy-card dummy-3"></div>
            <div class="card-inner" id="cardInner">
                <div class="card-front">?</div>
                <div class="card-back" id="dareTextDisplay"></div>
            </div>
        </div>

        <div id="endTurnControls" style="display:none; flex-direction: column; align-items: center;">
            <button onclick="endTurn()">I did it! Next Turn</button>
            <button onclick="skipDare()">Skip & Draw Again</button>
        </div>

        <div id="extraDareSection" style="margin-top: 30px; border-top: 1px solid #a4b0be; padding-top: 20px; width: 100%; max-width: 400px;">
            <p style="font-size: 14px; color: #a4b0be; margin-bottom: 5px;">Forgot one? Secretly add a dare!</p>
            <div style="display: flex; justify-content: center; align-items: center;">
                <input type="text" id="extraDareInput" placeholder="Sneaky dare..." style="width: 60%; margin: 5px; border-radius: 15px; padding: 10px;">
                <button onclick="addExtraDare()" style="padding: 10px 20px; font-size: 14px; background-color: #8e44ad; margin: 5px;">Add</button>
            </div>
        </div>

        <div id="reactionBar" style="margin-top: 20px; padding: 10px; background-color: rgba(255,255,255,0.1); border-radius: 25px; display: inline-block;">
            <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
            <button class="reaction-btn" onclick="sendReaction('😱')">😱</button>
            <button class="reaction-btn" onclick="sendReaction('😈')">😈</button>
            <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
            <button class="reaction-btn" onclick="sendReaction('🐔')">🐔</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); 
        let isMyTurn = false; 

        const shuffleAudio = new Audio('shuffle.mp3');
        const flipAudio = new Audio('flip.mp3');

        let mySecretId = sessionStorage.getItem('truthOrDare_SecretId');
        if (!mySecretId) {
            mySecretId = Math.random().toString(36).substring(2, 12); 
            sessionStorage.setItem('truthOrDare_SecretId', mySecretId);
        }

        const savedRoomCode = sessionStorage.getItem('truthOrDare_RoomCode');
        if (savedRoomCode) {
            socket.emit('reconnectPlayer', { roomCode: savedRoomCode, playerId: mySecretId });
        }

        function clearMemory() {
            sessionStorage.removeItem('truthOrDare_RoomCode');
        }

        function createGame() { 
            const mode = document.getElementById('gameMode').value;
            const name = document.getElementById('playerNameInput').value;
            if(!name) return alert("Please enter your name first!");
            socket.emit('createRoom', { mode: mode, name: name, playerId: mySecretId }); 
        }
        
        function joinGame() { 
            const roomCode = document.getElementById('roomCodeInput').value.toUpperCase();
            const name = document.getElementById('playerNameInput').value;
            if(!name || !roomCode) return alert("Please enter your name and a Room Code!");
            socket.emit('joinRoom', { roomCode: roomCode, name: name, playerId: mySecretId }); 
        }

        socket.on('roomCreated', (code) => {
            sessionStorage.setItem('truthOrDare_RoomCode', code); 
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('setupArea').style.display = 'block';
            document.getElementById('displayRoomCode').innerText = code;
        });

        socket.on('gameReady', (playerNames) => {
            sessionStorage.setItem('truthOrDare_RoomCode', document.getElementById('displayRoomCode').innerText || document.getElementById('roomCodeInput').value.toUpperCase());
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('setupArea').style.display = 'block';
            const myName = document.getElementById('playerNameInput').value;
            const allNames = Object.values(playerNames);
            const opponentName = allNames.find(n => n !== myName) || "Your friend";
            document.getElementById('statusMessage').innerText = `${opponentName} joined! Add your dares.`;
        });

        socket.on('reconnectSuccess', (data) => {
            document.getElementById('lobby').style.display = 'none';
            if (data.gameState === 'setup') {
                document.getElementById('setupArea').style.display = 'block';
                document.getElementById('displayRoomCode').innerText = data.roomCode;
            } else if (data.gameState === 'playing') {
                document.getElementById('gameArena').style.display = 'block';
            }
        });

        socket.on('reconnectFailed', () => {
            clearMemory(); 
            alert("Your previous game expired or was closed.");
        });

        socket.on('friendDisconnected', (name) => {
            document.getElementById('disconnectWarning').style.display = 'block';
            document.getElementById('drawBtn').disabled = true; 
        });

        socket.on('friendReconnected', (name) => {
            document.getElementById('disconnectWarning').style.display = 'none';
            document.getElementById('drawBtn').disabled = false; 
        });

        socket.on('gameAbandoned', () => {
            document.getElementById('disconnectWarning').style.display = 'none';
            document.getElementById('turnDisplay').innerText = "Game Over! Your friend abandoned the match.";
            document.getElementById('activePlayerControls').style.display = 'none';
            document.getElementById('endTurnControls').style.display = 'none';
            document.getElementById('cardArea').style.display = 'none';
            clearMemory(); 
        });

        function sendDaresToServer() {
            const rawText = document.getElementById('dareInputArea').value;
            const processedDares = rawText.split('\n').map(dare => dare.trim()).filter(dare => dare !== "");
            if(processedDares.length === 0) return alert("Type at least one dare before clicking ready!");
            
            socket.emit('submitDares', processedDares); 
            document.getElementById('dareInputArea').disabled = true;
            document.getElementById('readyBtn').style.display = 'none';
            document.getElementById('statusMessage').innerText = "Waiting for your friend to finish...";
        }

        socket.on('startActualGame', () => {
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';
        });

        function updateTurnUI(data) {
            const { activePlayerId, names } = data;
            const activeName = names[activePlayerId];
            const cardArea = document.getElementById('cardArea');
            cardArea.classList.remove('flipped', 'shuffling'); 
            cardArea.style.display = 'block'; 
            document.getElementById('endTurnControls').style.display = 'none'; 
            
            if (mySecretId === activePlayerId) {
                isMyTurn = true;
                document.getElementById('turnDisplay').innerText = `It is YOUR turn, ${activeName}!`;
                document.getElementById('activePlayerControls').style.display = 'block'; 
            } else {
                isMyTurn = false;
                document.getElementById('turnDisplay').innerText = `Waiting for ${activeName} to draw...`;
                document.getElementById('activePlayerControls').style.display = 'none'; 
            }
        }

        socket.on('updateTurn', updateTurnUI);

        function requestDare() {
            document.getElementById('activePlayerControls').style.display = 'none'; 
            const cardArea = document.getElementById('cardArea');
            cardArea.classList.add('shuffling');

            if(shuffleAudio) {
                shuffleAudio.currentTime = 0; 
                shuffleAudio.play().catch(e => console.log("Audio play prevented"));
            }

            setTimeout(() => {
                cardArea.classList.remove('shuffling');
                socket.emit('getDare');
            }, 1500);
        }

        // --- NEW: THE SKIP LOGIC ---
        function skipDare() {
            // Hide the buttons immediately
            document.getElementById('endTurnControls').style.display = 'none';
            
            // Flip the card back over to hide the old dare
            const cardArea = document.getElementById('cardArea');
            cardArea.classList.remove('flipped');

            // Wait a split second for the card to physically flip back, then draw again!
            setTimeout(() => {
                requestDare(); 
            }, 600); 
        }

        socket.on('showDare', (dareText) => {
            document.getElementById('activePlayerControls').style.display = 'none'; 
            document.getElementById('dareTextDisplay').innerText = dareText;
            
            setTimeout(() => {
                document.getElementById('cardArea').classList.add('flipped');
                if(flipAudio) {
                    flipAudio.currentTime = 0;
                    flipAudio.play().catch(e => console.log("Audio play prevented"));
                }
            }, 100);

            if (isMyTurn) {
                setTimeout(() => {
                    // Display BOTH buttons now
                    document.getElementById('endTurnControls').style.display = 'flex';
                }, 800);
            }
        });

        function endTurn() { socket.emit('nextTurn'); }

        socket.on('gameOver', () => {
            document.getElementById('turnDisplay').innerText = "Game Over! You ran out of dares.";
            document.getElementById('activePlayerControls').style.display = 'none';
            document.getElementById('endTurnControls').style.display = 'none';
            document.getElementById('cardArea').style.display = 'none';
            clearMemory(); 
        });

        function addExtraDare() {
            const input = document.getElementById('extraDareInput');
            const newDare = input.value.trim();
            if (newDare !== "") {
                socket.emit('addExtraDare', newDare);
                input.value = "";
                alert("Secret dare added to the deck!");
            }
        }

        socket.on('deckRestocked', (data) => {
            if (document.getElementById('turnDisplay').innerText.includes("Game Over")) {
                updateTurnUI(data); 
            }
        });

        let isReactionCooldown = false;
        function sendReaction(emoji) {
            if (isReactionCooldown) return; 
            socket.emit('sendReaction', emoji);
            isReactionCooldown = true;
            setTimeout(() => { isReactionCooldown = false; }, 500);
        }

        socket.on('showReaction', (emoji) => {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = 'floating-emoji';
            const isLeft = Math.random() > 0.5;
            if (isLeft) {
                const randomLeft = Math.floor(Math.random() * 20) + 10;
                el.style.left = `${randomLeft}%`;
            } else {
                const randomRight = Math.floor(Math.random() * 20) + 70;
                el.style.left = `${randomRight}%`;
            }
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        });
    </script>
</body>
</html>
